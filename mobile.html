<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>修仙战棋 📱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
body{background:#0a0e1a;font-family:'Microsoft YaHei','PingFang SC',sans-serif;overflow-x:hidden;overflow-y:auto;width:100%;min-height:100vh;margin:0;}
#app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;background:linear-gradient(135deg,#1a1a2e,#16213e);overflow-x:hidden;}
.top-bar{display:flex;gap:2px;padding:3px 3px;background:rgba(0,0,0,0.4);font-size:10px;color:#ddd;flex-wrap:wrap;justify-content:center;}
.top-bar .stat{padding:1px 4px;background:rgba(255,255,255,0.05);border-radius:3px;white-space:nowrap;}
.top-bar .val{color:#ffd700;font-weight:bold;font-size:11px;}
.synergy-bar{display:flex;gap:2px;padding:2px 4px;overflow-x:auto;font-size:9px;background:rgba(0,0,0,0.15);}
.synergy-tag{padding:1px 3px;border-radius:3px;white-space:nowrap;border:1px solid rgba(255,255,255,0.06);flex-shrink:0;color:#888;}
.synergy-tag.active-1{border-color:#8a8;color:#8a8;}.synergy-tag.active-2{border-color:#fd0;color:#fd0;}.synergy-tag.inactive{opacity:0.3;}
.board-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2px;min-height:0;}
.board{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;width:100%;max-width:100%;aspect-ratio:1;padding:3px;background:rgba(0,0,0,0.25);border-radius:6px;}
.cell{border-radius:3px;border:1px solid rgba(255,255,255,0.04);position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(18px,5vw,28px);}
.cell.player{background:rgba(50,100,255,0.08);}.cell.enemy{background:rgba(255,50,50,0.08);}
.cell .unit{width:100%;height:100%;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.cell .unit .stars{position:absolute;top:0;right:1px;font-size:6px;color:#ffd700;}
.cell .unit .hp-bar{position:absolute;bottom:1px;left:2px;right:2px;height:3px;background:rgba(0,0,0,0.4);border-radius:1px;}
.cell .unit .hp-bar .fill{height:100%;border-radius:1px;transition:width .2s;}
.bottom-panel{background:rgba(0,0,0,0.35);padding:3px 4px;border-radius:6px 6px 0 0;}
.shop-row{display:flex;gap:2px;justify-content:center;margin-bottom:2px;}
.shop-card{flex:1;max-width:none;padding:3px 1px;border-radius:4px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);text-align:center;}
.shop-card .icon{font-size:clamp(16px,4vw,22px);}.shop-card .sname{font-size:clamp(7px,1.8vw,9px);color:#ccc;}.shop-card .scost{font-size:clamp(6px,1.5vw,8px);color:#aaa;}
.btn-row{display:flex;gap:2px;margin-bottom:2px;}
.btn{flex:1;padding:6px 0;border-radius:4px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.05);color:#ccc;font-size:clamp(10px,2.5vw,12px);text-align:center;}
.btn.primary{background:rgba(255,215,0,0.12);border-color:#ffd700;color:#ffd700;}
.btn:disabled{opacity:0.2;}
.bench-row{display:flex;gap:2px;overflow-x:auto;padding:2px 0;min-height:40px;}
.bench-unit{width:38px;height:38px;border-radius:3px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;position:relative;font-size:clamp(14px,3.5vw,20px);}
.bench-unit .stars{font-size:6px;color:#fd0;position:absolute;top:0;right:1px;}
.bench-unit .cost{font-size:6px;color:#888;position:absolute;bottom:0;right:2px;}
.battle-log{display:none;position:fixed;left:50%;transform:translateX(50%);top:36px;width:90vw;max-width:350px;max-height:35vh;background:rgba(0,0,0,0.85);border:1px solid rgba(255,215,0,0.15);border-radius:6px;padding:4px;z-index:51;overflow-y:auto;font-size:10px;color:#fff;}
.battle-log div{padding:1px 0;}.battle-log .hit{color:#f66;}.battle-log .kill{color:#fd0;}.battle-log .heal{color:#6c6;}.battle-log .info{color:#6cf;}
.result-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:60;justify-content:center;align-items:center;}
.result-box{background:rgba(20,26,46,0.95);border:2px solid #ffd700;border-radius:12px;padding:16px 24px;text-align:center;color:#fff;min-width:220px;}
.result-box h2{font-size:20px;}
.artifact-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:70;justify-content:center;align-items:center;}
.artifact-box{background:linear-gradient(135deg,#1e2a4a,#2a1a3e);border:2px solid #b388ff;border-radius:12px;padding:14px 16px;text-align:center;color:#fff;max-width:320px;}
.artifact-cards{display:flex;gap:6px;justify-content:center;margin:8px 0;}
.artifact-card{flex:1;padding:8px 2px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);}
.artifact-card .icon{font-size:24px;}.artifact-card .aname{font-size:11px;color:#ddd;}.artifact-card .adesc{font-size:8px;color:#888;}
.tooltip-el{display:none;position:fixed;background:rgba(10,14,26,0.95);border:1px solid rgba(255,215,0,0.3);border-radius:6px;padding:5px 8px;font-size:11px;color:#ddd;z-index:80;pointer-events:none;max-width:180px;}
.tooltip-el .tt-name{color:#fd0;font-weight:bold;font-size:12px;}
@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes atk{0%,100%{transform:translateX(0)}25%{transform:translateX(5px)}50%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
@keyframes hit{0%,100%{opacity:1}25%{opacity:0.3}50%{opacity:1}75%{opacity:0.3}}
@keyframes die{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0)}}
.cell .unit.idle{animation:idle 2.5s ease-in-out infinite;}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar" id="topBar"></div>
  <div class="synergy-bar" id="synergyBar"></div>
  <div class="board-wrap"><div class="board" id="gameBoard"></div></div>
  <div class="bottom-panel">
    <div class="bench-row" id="benchRow"></div>
    <div class="shop-row" id="shopRow"></div>
    <div class="btn-row">
      <div class="btn" id="refreshBtn">🔄刷新</div>
      <div class="btn" id="levelBtn">⬆️升级</div>
      <div class="btn" id="adBtn">📺广告</div>
      <div class="btn primary" id="startBtn">⚔️开战</div>
    </div>
  </div>
</div>
<div class="battle-log" id="battleLog"></div>
<div class="result-overlay" id="resultOverlay"><div class="result-box"><div id="resultContent"></div><div class="btn primary" id="battleDoneBtn" style="margin-top:10px;padding:8px 24px;display:inline-block;">继续</div></div></div>
<div class="artifact-overlay" id="artifactOverlay"><div class="artifact-box"><h2 style="color:#b388ff;font-size:16px;">🏺神器</h2><div class="artifact-cards" id="artifactCards"></div><div style="font-size:10px;color:#666;">已拥有:<span id="artCountMob">0</span></div></div></div>
<div class="tooltip-el" id="tooltipEl"></div>
<script>
const UNITS=[
{id:'s1',name:'练气剑修',icon:'🗡️',cost:1,hp:60,atk:15,def:3,range:'近战',factions:['剑修'],desc:'基础剑修'},
{id:'b1',name:'练气体修',icon:'💪',cost:1,hp:90,atk:8,def:8,range:'近战',factions:['体修'],desc:'血厚'},
{id:'sc1',name:'散修学徒',icon:'🌀',cost:1,hp:50,atk:18,def:2,range:'近战',factions:['散修'],desc:'高攻'},
{id:'a1',name:'丹童',icon:'🧪',cost:1,hp:55,atk:10,def:3,range:'远程',factions:['丹修'],desc:'回血'},
{id:'be1',name:'灵兽幼崽',icon:'🐉',cost:1,hp:70,atk:12,def:5,range:'近战',factions:['妖修'],desc:'妖族'},
{id:'s2',name:'筑基剑修',icon:'⚔️',cost:2,hp:100,atk:28,def:5,range:'近战',factions:['剑修'],desc:'剑气'},
{id:'r2',name:'符修',icon:'📜',cost:2,hp:75,atk:22,def:2,range:'远程',factions:['符修'],desc:'法攻'},
{id:'b2',name:'筑基体修',icon:'🛡️',cost:2,hp:150,atk:14,def:12,range:'近战',factions:['体修'],desc:'铁骨'},
{id:'d2',name:'入魔散修',icon:'👺',cost:2,hp:80,atk:30,def:3,range:'近战',factions:['散修','魔修'],desc:'双羁'},
{id:'be2',name:'妖兽',icon:'🐲',cost:2,hp:110,atk:20,def:7,range:'近战',factions:['妖修'],desc:'妖战'},
{id:'s3',name:'金丹剑修',icon:'🌟',cost:3,hp:150,atk:45,def:8,range:'近战',factions:['剑修'],desc:'破法'},
{id:'r3',name:'金丹符师',icon:'🔮',cost:3,hp:110,atk:35,def:4,range:'远程',factions:['符修'],desc:'通天'},
{id:'ar3',name:'阵修',icon:'🔷',cost:3,hp:130,atk:25,def:6,range:'远程',factions:['阵修'],desc:'布阵'},
{id:'d3',name:'魔道散修',icon:'😈',cost:3,hp:120,atk:40,def:5,range:'近战',factions:['散修','魔修'],desc:'嗜血'},
{id:'a3',name:'丹修长老',icon:'💊',cost:3,hp:100,atk:30,def:4,range:'远程',factions:['丹修'],desc:'大回'},
{id:'s4',name:'元婴剑尊',icon:'⚡',cost:4,hp:200,atk:60,def:10,range:'近战',factions:['剑修'],desc:'万剑'},
{id:'ar4',name:'护山大阵',icon:'🛐',cost:4,hp:180,atk:35,def:8,range:'远程',factions:['阵修'],desc:'护盾'},
{id:'d4',name:'魔尊',icon:'👿',cost:4,hp:160,atk:55,def:7,range:'近战',factions:['魔修'],desc:'吸血'},
{id:'be4',name:'上古妖王',icon:'🐯',cost:4,hp:220,atk:50,def:12,range:'近战',factions:['妖修'],desc:'冲天'},
{id:'s5',name:'化神剑神',icon:'☀️',cost:5,hp:280,atk:80,def:15,range:'近战',factions:['剑修','散修'],desc:'巅峰'},
{id:'ar5',name:'天道阵盘',icon:'💠',cost:5,hp:250,atk:55,def:12,range:'远程',factions:['阵修','符修'],desc:'合一'},
{id:'d5',name:'上古天魔',icon:'🔥',cost:5,hp:300,atk:75,def:14,range:'近战',factions:['魔修','妖修'],desc:'万魔'},
{id:'r4',name:'符修大师',icon:'🧧',cost:4,hp:130,atk:42,def:5,range:'远程',factions:['符修'],desc:'归宗'},
{id:'bd3',name:'体修宗师',icon:'🥋',cost:3,hp:200,atk:18,def:16,range:'近战',factions:['体修'],desc:'不坏'},
{id:'bd4',name:'金刚体修',icon:'🔱',cost:4,hp:260,atk:22,def:20,range:'近战',factions:['体修'],desc:'明王'},
{id:'a2',name:'丹修大师',icon:'⚗️',cost:2,hp:80,atk:15,def:4,range:'远程',factions:['丹修'],desc:'炼丹'},
{id:'a4',name:'药王',icon:'🌾',cost:4,hp:120,atk:35,def:6,range:'远程',factions:['丹修'],desc:'妙手'},
{id:'sc4',name:'散修高手',icon:'💫',cost:4,hp:100,atk:50,def:4,range:'近战',factions:['散修'],desc:'必杀'},
{id:'ar2',name:'阵法宗师',icon:'🔶',cost:2,hp:90,atk:18,def:5,range:'远程',factions:['阵修'],desc:'如神'},
{id:'be3',name:'妖狐',icon:'🦊',cost:3,hp:130,atk:30,def:6,range:'远程',factions:['妖修'],desc:'狡猾'},
];
const FAC={'剑修':{icon:'⚔️',t1:'+30%攻',t2:'+60%攻',t3:'+100%攻'},'体修':{icon:'🛡️',t1:'+30%血',t2:'+60%血',t3:'+100%血'},'散修':{icon:'🌀',t1:'+20%暴',t2:'+40%暴',t3:'+60%暴'},'符修':{icon:'📜',t1:'+30%法',t2:'+60%法',t3:'无视防'},'丹修':{icon:'💊',t1:'回15%血',t2:'回25%血',t3:'复活'},'阵修':{icon:'🔷',t1:'20%盾',t2:'35%盾',t3:'反伤'},'魔修':{icon:'👿',t1:'+25%吸',t2:'+40%吸',t3:'永久血'},'妖修':{icon:'🐲',t1:'+25%速',t2:'+50%速',t3:'+75%速'}};
const CTR={'剑修':'体修','体修':'散修','散修':'剑修','符修':'阵修','阵修':'妖修','妖修':'符修','丹修':'魔修','魔修':'丹修'};
const CXS=[{id:'iw',facs:['剑修','体修'],need:2,icon:'⛓️',name:'铁壁'},{id:'sa',facs:['符修','阵修'],need:2,icon:'🔮',name:'灵阵'},{id:'fe',facs:['丹修','散修'],need:2,icon:'✨',name:'仙缘'},{id:'db',facs:['魔修','妖修'],need:2,icon:'🌪️',name:'魔性'}];
const STG=[{min:1,max:5,name:'练气'},{min:6,max:10,name:'筑基'},{min:11,max:15,name:'金丹'},{min:16,max:20,name:'元婴'},{min:21,max:30,name:'化神'}];
const BOSS=[{r:5,n:'筑基妖兽',i:'🐗',hp:400,atk:25,d:8},{r:10,n:'金丹魔修',i:'👹',hp:650,atk:40,d:12},{r:15,n:'元婴剑尊',i:'⚡',hp:1000,atk:55,d:16},{r:20,n:'化神天魔',i:'🔥',hp:1700,atk:80,d:25},{r:25,n:'渡劫真仙',i:'☀️',hp:2600,atk:110,d:35}];
const ART=[{id:'hp_up',n:'仙丹',i:'💊',d:'+15%生命'},{id:'atk_up',n:'利器',i:'⚔️',d:'+15%攻击'},{id:'shield',n:'金钟',i:'🛡️',d:'+20护盾'},{id:'lifesteal',n:'血魔',i:'🩸',d:'+15%吸血'},{id:'dodge',n:'疾风',i:'💨',d:'+12%闪避'},{id:'regen',n:'生机',i:'🌿',d:'每轮回血'},{id:'frost',n:'寒冰',i:'❄️',d:'+35%伤害'},{id:'execute',n:'斩龙',i:'💀',d:'30%斩杀'},{id:'infinity',n:'无限',i:'♾️',d:'每回合+5%'}];
let G={},animating=false,selBench=null,batRound=0;
function rd(n){return Math.floor(Math.random()*n);}
function getStage(r){return STG.find(s=>r>=s.min&&r<=s.max)||STG[STG.length-1];}
function maxB(){return Math.min(G.level+1,9);}
function lvB(){return 1+G.expPurchased*0.02;}
function rc(c){return {1:'rgba(100,100,100,0.3)',2:'rgba(50,150,50,0.3)',3:'rgba(50,100,255,0.3)',4:'rgba(150,50,200,0.3)',5:'rgba(255,150,0,0.3)'}[c]||'rgba(100,100,100,0.2)';}
function init(){G={hp:100,maxHp:100,gold:5,level:1,exp:0,expMax:4,round:1,streak:0,board:Array(18).fill(null),enemyBoard:Array(18).fill(null),bench:[],shop:[],gameOver:false,artifacts:[],artifactPickRound:0,expPurchased:0,enemiesDefeated:false,adUsedThisRound:false};selBench=null;genEnemy();roll();render();}
function roll(){const lv=G.level,p=[[100,0,0,0,0],[70,30,0,0,0],[55,30,15,0,0],[40,30,20,10,0],[30,25,25,15,5],[20,20,25,25,10],[15,15,20,30,20],[10,10,15,30,35],[5,5,10,30,50]];const pp=p[Math.min(lv-1,p.length-1)];G.shop=[];for(let i=0;i<5;i++){let r=rd(100),c=1;for(let j=0;j<5;j++){if(r<pp[j]){c=j+1;break;}r-=pp[j];}const cs=UNITS.filter(u=>u.cost===c);if(cs.length)G.shop.push({...cs[rd(cs.length)],uid:'u_'+Date.now()+'_'+i});}}
function buy(i){if(G.gold<G.shop[i].cost||G.bench.length>=10&&G.board.filter(u=>u===null).length===0)return;G.gold-=G.shop[i].cost;const u=G.shop[i];const nu={...u,uid:'u_'+Date.now()+'_'+rd(9999),star:1};const ck=[...G.bench,...G.board.filter(x=>x)];const sm=ck.filter(x=>x&&x.id===u.id&&x.star===1);if(sm.length>=2){const b1=G.bench.findIndex(x=>x&&x.id===u.id&&x.star===1);if(b1>=0){const b2=G.bench.findIndex((x,i)=>x&&x.id===u.id&&x.star===1&&i!==b1);if(b2>=0){G.bench.splice(Math.max(b1,b2),1);G.bench.splice(Math.min(b1,b2),1);G.bench.push({...nu,star:2,hp:Math.floor(u.hp*1.8),atk:Math.floor(u.atk*1.8)});G.shop.splice(i,1);bl(`⭐${u.name}★★`);render();return;}}}const si=G.bench.findIndex(x=>x&&x.id===u.id&&x.star===1);if(si>=0){G.bench[si]={...G.bench[si],star:2,hp:Math.floor(G.bench[si].hp*1.8),atk:Math.floor(G.bench[si].atk*1.8)};G.shop.splice(i,1);bl(`⭐${u.name}★★`);if(m3(u,nu))return;render();return;}const bi=G.board.findIndex(x=>x&&x.id===u.id&&x.star===1);if(bi>=0){G.board[bi]={...G.board[bi],star:2,hp:Math.floor(G.board[bi].hp*1.8),atk:Math.floor(G.board[bi].atk*1.8)};G.shop.splice(i,1);bl(`⭐场上${u.name}★★`);if(m3(u,nu))return;render();return;}if(m3(u,nu))return;G.bench.push(nu);G.shop.splice(i,1);bl(`🛒${u.name}`);render();}
function m3(u,nu){const s2=[...G.bench,...G.board.filter(x=>x)].filter(x=>x&&x.id===u.id&&x.star===2);if(s2.length<3)return false;const ib=[];const ibd=[];for(let i=0;i<G.bench.length;i++){if(G.bench[i]&&G.bench[i].id===u.id&&G.bench[i].star===2)ib.push(i);}for(let i=0;i<G.board.length;i++){if(G.board[i]&&G.board[i].id===u.id&&G.board[i].star===2)ibd.push(i);}const tb=ib.slice(0,3);let r=0;for(const b of tb){G.bench[b]=null;r++;}if(r<3){const n=3-r;for(let i=0;i<n&&i<ibd.length;i++){G.board[ibd[i]]=null;}}G.bench=G.bench.filter(x=>x!==null);G.bench.push({...nu,star:3,hp:Math.floor(u.hp*3.2),atk:Math.floor(u.atk*3.2)});bl(`⭐⭐${u.name}★★★!`);return true;}
function place(uid,bidx){const bi=G.bench.findIndex(u=>u&&u.uid===uid);if(bi<0)return;if(G.board.filter(u=>u!==null).length>=maxB()&&G.board[bidx]===null)return;if(G.board[bidx]!==null){const t=G.board[bidx];G.board[bidx]=G.bench[bi];G.bench[bi]=t;render();return;}G.board[bidx]=G.bench[bi];G.bench.splice(bi,1);render();}
function sell(uid){const bi=G.bench.findIndex(u=>u&&u.uid===uid);if(bi<0)return;G.gold+=Math.floor(G.bench[bi].cost*(G.bench[bi].star>=2?2:1));G.bench.splice(bi,1);render();}
function lvUp(){if(G.gold<4)return;G.gold-=4;G.exp++;G.expPurchased++;bl(`📊+${Math.round((lvB()-1)*100)}%`);if(G.exp>=G.expMax){G.level++;G.exp=0;G.expMax=Math.min(G.level+3,10);bl(`📊Lv${G.level}`);}render();}
function ref(){const c=G.artifacts&&G.artifacts.some(a=>a.id==='bag_of_holding')?1:2;if(G.gold<c)return;G.gold-=c;roll();render();}
function calcSyn(us){const c={};for(const u of us){if(!u)continue;for(const f of u.factions)c[f]=(c[f]||0)+1;}const r={};const th={剑修:[2,4,6],体修:[2,4,6],散修:[2,4,6],符修:[2,3,5],丹修:[2,3,5],阵修:[2,3,5],魔修:[2,4,6],妖修:[2,4,6]};for(const[f,cc]of Object.entries(c)){let t=0;const ts=th[f]||[2,3,5];for(let i=ts.length-1;i>=0;i--){if(cc>=ts[i]){t=i+1;break;}}if(t>0)r[f]={count:cc,tier:t};}for(const cs of CXS){if(cs.facs.every(f=>c[f]&&c[f]>=(cs.need||2))){r[cs.id]={count:1,tier:1,cross:true};}}return r;}
function genEnemy(){G.enemyBoard=Array(18).fill(null);const bi=BOSS.find(b=>b.r===G.round);const cnt=Math.min(1+Math.floor(G.round/2),8);const mc=Math.min(1+Math.floor((G.round-1)/2),5);const sg=getStage(G.round);const si=STG.indexOf(sg);const dm=1+si*0.10;const pool=[];for(let i=0;i<cnt;i++){const c=Math.max(1,1+rd(Math.min(mc,5)));const cs=UNITS.filter(u=>u.cost===c);if(cs.length){const u={...cs[rd(cs.length)],uid:'e_'+i+'_'+Date.now(),star:1};if(G.round>=6&&Math.random()<0.2){u.star=2;u.hp=Math.floor(u.hp*1.5);u.atk=Math.floor(u.atk*1.5);}if(G.round>=10&&Math.random()<0.25){u.star=2;u.hp=Math.floor(u.hp*1.5);u.atk=Math.floor(u.atk*1.5);}if(G.round>=15&&Math.random()<0.15){u.star=3;u.hp=Math.floor(u.hp*2.2);u.atk=Math.floor(u.atk*2.2);}u.hp=Math.floor(u.hp*dm);u.atk=Math.floor(u.atk*dm);pool.push(u);}}if(bi){pool.push({uid:'boss_'+G.round,star:3,range:'近战',factions:['妖修'],name:bi.n,icon:bi.i,cost:5,hp:bi.hp,atk:bi.atk,def:bi.d});}const ml=pool.filter(u=>u.range==='近战');const rg=pool.filter(u=>u.range!=='近战');for(let i=0;i<Math.min(ml.length,6);i++)G.enemyBoard[i]=ml[i];for(let i=0;i<Math.min(rg.length,6);i++)G.enemyBoard[6+i]=rg[i];const ex=[...ml.slice(6),...rg.slice(6)];for(let i=0;i<Math.min(ex.length,6);i++)G.enemyBoard[12+i]=ex[i];}
function startBat(){if(animating)return;const ac=G.board.filter(u=>u!==null);if(ac.length===0){alert('放修士!');return}animating=true;batRound=0;document.getElementById('battleLog').innerHTML='';document.getElementById('battleLog').style.display='block';const myU=G.board.map(u=>u?JSON.parse(JSON.stringify(u)):null);const enU=G.enemyBoard.map(u=>u?JSON.parse(JSON.stringify(u)):null);const lb=lvB();for(const u of myU)if(u){u.hp=Math.floor(u.hp*lb);u.atk=Math.floor(u.atk*lb);u.maxHp=u.hp;}for(const u of myU)if(u){u.maxHp=u.hp;u.shield=0;}for(const u of enU)if(u){u.maxHp=u.hp;u.shield=0;}const ms=calcSyn(myU);const es=calcSyn(enU);bl('⚔️战!');document.getElementById('startBtn').textContent='⚔️...';batStep(myU,enU,ms,es,0);}
function batStep(myU,enU,ms,es,rn){if(rn>=30){endBat(0,myU,enU);return}batRound=rn+1;const ma=myU.filter(u=>u&&u.hp>0);const ea=enU.filter(u=>u&&u.hp>0);if(ma.length===0||ea.length===0){endBat(ma.length>0?1:-1,myU,enU);return}const atks=[];function ft(a,tg,ie){const fi=ie?[0,1,2,3,4,5]:[12,13,14,15,16,17];const fa=fi.map(i=>tg[i]).filter(u=>u&&u.hp>0);if(fa.length>0)return fa[0];const aa=tg.filter(u=>u&&u.hp>0);return aa.length>0?aa[0]:null;}function cd(a,t){let d=Math.max(1,a.atk+rd(5)-(t.def||0));let cb=1;for(const af of a.factions||[]){const co=CTR[af];if(co&&t.factions&&t.factions.includes(co)){cb=1.5;break;}}d=Math.floor(d*cb);return d;}for(const a of ma){if(!a||a.hp<=0)continue;const t=ft(a,enU,true);if(!t)continue;let d=cd(a,t);if(t.shield>0){if(t.shield>=d){t.shield-=d;d=0;}else{d-=t.shield;t.shield=0;}}t.hp-=d;bl(`🗡️${a.name}→${t.name}${d}`);if(t.hp<=0){t.hp=0;bl(`💀${t.name}`);}}for(const a of ea){if(!a||a.hp<=0)continue;const t=ft(a,myU,false);if(!t)continue;let d=cd(a,t);if(t.shield>0){if(t.shield>=d){t.shield-=d;d=0;}else{d-=t.shield;t.shield=0;}}t.hp-=d;bl(`👹${a.name}→${t.name}${d}`);if(t.hp<=0){t.hp=0;bl(`💀我${t.name}`);}}renderBatBd(myU,enU);const ma2=myU.filter(u=>u&&u.hp>0);const ea2=enU.filter(u=>u&&u.hp>0);if(ma2.length===0||ea2.length===0){setTimeout(()=>endBat(ma2.length>ea2.length?1:(ea2.length>ma2.length?-1:0),myU,enU),400);return;}setTimeout(()=>batStep(myU,enU,ms,es,rn+1),400);}
function renderBatBd(myU,enU){const el=document.getElementById('gameBoard');el.innerHTML='';for(let i=0;i<36;i++){const c=document.createElement('div');const r=Math.floor(i/6);c.className='cell '+(r<3?'player':'enemy');const u=r<3?myU[i]:enU[i-18];if(u){const d=document.createElement('div');d.className='unit idle';d.style.background=rc(u.cost);const p=u.maxHp>0?u.hp/u.maxHp:0;d.innerHTML=`<div>${u.icon}</div><div class="hp-bar"><div class="fill" style="width:${Math.max(0,p*100)}%;background:${p>0.5?'#4c4':p>0.25?'#cc4':'#c44'}"></div></div>`;c.appendChild(d);}el.appendChild(c);}}
function endBat(res){animating=false;document.getElementById('startBtn').textContent='⚔️开战';let c='';if(res===1){let gw=3+Math.min(G.streak>0?G.streak:0,3)+Math.floor(G.level/2);G.gold+=gw;G.streak=G.streak>0?G.streak+1:1;c=`<h2 style="color:#69db7c;">🎉胜</h2><div style="color:#fd0;font-size:18px;">+${gw}🪙</div>`;bl('🎉胜!');}else if(res===-1){G.gold+=1;G.streak=G.streak<0?G.streak-1:-1;c=`<h2 style="color:#f66;">💔败</h2>`;bl('💔败');}else{G.gold+=2;G.enemiesDefeated=true;c=`<h2 style="color:#6cf;">⚖️平</h2>`;}if(G.artifacts&&G.artifacts.some(a=>a.id==='gold_bonus'))G.gold+=3;const int=Math.min(Math.floor(G.gold/10),3);G.gold+=int;G.round++;if(G.hp<=0){G.hp=0;G.gameOver=true;c=`<h2 style="color:#f44;">💀陨</h2><div>${G.round-1}轮</div>`;bl('💀陨');}else G.enemiesDefeated=(res===1);document.getElementById('resultContent').innerHTML=c;document.getElementById('battleDoneBtn').onclick=afterBat;document.getElementById('resultOverlay').style.display='flex';setTimeout(()=>{document.getElementById('battleLog').style.display='none';render();},100);}
function afterBat(){document.getElementById('resultOverlay').style.display='none';if(G.gameOver){init();return}G.adUsedThisRound=false;if(G.enemiesDefeated){genEnemy();if(G.round>=3&&(G.round-G.artifactPickRound>=3)&&G.artifacts.length<5)showArt();}render();roll();}
function showArt(){const ow=new Set(G.artifacts.map(a=>a.id));const pl=ART.filter(a=>!ow.has(a.id));if(pl.length===0)return;const sh=[...pl];for(let i=sh.length-1;i>0;i--){const j=rd(i+1);[sh[i],sh[j]]=[sh[j],sh[i]];}const ch=sh.slice(0,3);const el=document.getElementById('artifactCards');el.innerHTML='';for(const a of ch){const c=document.createElement('div');c.className='artifact-card';c.innerHTML=`<div class="icon">${a.i}</div><div class="aname">${a.n}</div><div class="adesc">${a.d}</div>`;c.onclick=()=>{G.artifacts.push({id:a.id,name:a.n,icon:a.i,desc:a.d});G.artifactPickRound=G.round;document.getElementById('artifactOverlay').style.display='none';bl(`🏺${a.n}`);render();};el.appendChild(c);}document.getElementById('artifactOverlay').style.display='flex';}
function watchAd(){if(G.adUsedThisRound)return;G.adUsedThisRound=true;G.gold+=2+rd(4);bl('📺+🪙');render();}
function bl(m,c='info'){const el=document.getElementById('battleLog');const d=document.createElement('div');d.className=c;d.textContent=m;el.appendChild(d);el.scrollTop=el.scrollHeight;}
function render(){renderTB();renderSyn();renderBoard();renderShop();renderBench();renderBtns();}
function renderTB(){const s=getStage(G.round);const ib=BOSS.some(b=>b.r===G.round);document.getElementById('topBar').innerHTML=`<span class="stat">❤️<span class="val">${G.hp}</span></span><span class="stat">🪙<span class="val">${G.gold}</span></span><span class="stat">📊<span class="val">${G.level}⭐${Math.round((lvB()-1)*100)}%</span></span><span class="stat">${ib?'👑':''}<span class="val">${s.name}${G.round}</span></span><span class="stat">🏆<span class="val">${G.streak>0?'🔥'+G.streak:G.streak<0?'💧'+(-G.streak):'-'}</span></span><span class="stat">📦<span class="val">${G.board.filter(u=>u!==null).length}/${maxB()}</span></span>${G.artifacts.length?`<span class="stat">🏺<span class="val">${G.artifacts.length}</span></span>`:''}`;}
function renderSyn(){const el=document.getElementById('synergyBar');el.innerHTML='';const ac=G.board.filter(u=>u!==null);const syn=calcSyn(ac);for(const[f,info]of Object.entries(FAC)){const ai=syn[f];const t=document.createElement('div');t.className=`synergy-tag ${ai?'active-'+ai.tier:'inactive'}`;const cnt=ac.filter(u=>u&&u.factions.includes(f)).length;t.textContent=info.icon+f+cnt;el.appendChild(t);}}
function renderBoard(){const el=document.getElementById('gameBoard');el.innerHTML='';for(let i=0;i<36;i++){const c=document.createElement('div');const r=Math.floor(i/6);c.className='cell '+(r<3?'player':'enemy');if(r<3&&G.board[i]){const u=G.board[i];const d=document.createElement('div');d.className='unit idle';d.style.background=rc(u.cost);d.innerHTML=`<div>${u.icon}</div><div class="stars">${'★'.repeat(u.star||1)}</div><div class="hp-bar"><div class="fill" style="width:100%;background:#4c4"></div></div>`;d.onclick=(e)=>{e.stopPropagation();G.bench.push({...u});G.board[i]=null;selBench=null;render();};c.appendChild(d);}else if(r<3&&G.board[i]===null){if(selBench)c.style.border='1px solid rgba(255,215,0,0.4)';c.onclick=(e)=>{e.stopPropagation();if(selBench!==null){place(selBench,i);selBench=null;render();}};}else if(r>=3){const ei=i-18;if(G.enemyBoard[ei]){const u=G.enemyBoard[ei];c.style.background='rgba(255,50,50,0.12)';c.innerHTML=`<div style="font-size:clamp(16px,4vw,24px);">${u.icon}</div>`;}}el.appendChild(c);}}
function renderShop(){const el=document.getElementById('shopRow');el.innerHTML='';for(let i=0;i<G.shop.length;i++){const u=G.shop[i];const c=document.createElement('div');c.className='shop-card';c.innerHTML=`<div class="icon">${u.icon}</div><div class="sname">${u.name}</div><div class="scost">${u.cost}🪙</div>`;c.onclick=()=>buy(i);el.appendChild(c);}}
function renderBench(){const el=document.getElementById('benchRow');el.innerHTML='';for(const u of G.bench){const d=document.createElement('div');d.className='bench-unit';d.style.background=rc(u.cost);if(selBench===u.uid)d.style.borderColor='#fd0';d.innerHTML=`<div>${u.icon}</div><div class="stars">${'★'.repeat(u.star||1)}</div>`;d.onclick=(e)=>{e.stopPropagation();if(selBench===u.uid){selBench=null;render();return}selBench=u.uid;render();};d.oncontextmenu=(e)=>{e.preventDefault();sell(u.uid);};el.appendChild(d);}}
function renderBtns(){document.getElementById('refreshBtn').style.opacity=G.gold<2||animating?'0.2':'1';document.getElementById('levelBtn').style.opacity=G.gold<4||animating?'0.2':'1';document.getElementById('startBtn').style.opacity=animating?'0.5':'1';document.getElementById('adBtn').style.opacity=G.adUsedThisRound||animating||G.gameOver?'0.2':'1';document.getElementById('adBtn').textContent=G.adUsedThisRound?'✅':'📺广告';}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('startBtn').onclick=startBat;document.getElementById('refreshBtn').onclick=ref;document.getElementById('levelBtn').onclick=lvUp;document.getElementById('adBtn').onclick=watchAd;init();});
</script>
</body>
